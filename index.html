<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет пассажиров теплоходов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 28px;
            color: #1a2c3e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #5a6e7c;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e9ecef;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            background: white;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .time-btn {
            padding: 12px;
            background: #f8f9fa;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: #2c3e50;
        }

        .time-btn:hover {
            background: #e9ecef;
            transform: translateY(-1px);
        }

        .time-btn.selected {
            background: #2a5298;
            border-color: #2a5298;
            color: white;
        }

        .count-control {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .count-control input {
            flex: 1;
        }

        .zero-btn {
            padding: 12px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .zero-btn:hover {
            background: #c0392b;
        }

        button.submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #27ae60 0%, #219a52 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: transform 0.2s;
        }

        button.submit:hover {
            transform: translateY(-2px);
        }

        button.submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .schedule-section {
            display: none;
        }

        .schedule-section.active {
            display: block;
        }

        .ship-info {
            background: #f0f2f5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #2c3e50;
        }

        .ship-info span {
            font-weight: 700;
            color: #2a5298;
        }

        @media (max-width: 600px) {
            .time-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .card {
                padding: 24px;
            }
            .count-control {
                flex-direction: column;
            }
            .zero-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>
                <span>🚢</span> Учет пассажиров
            </h1>
            <div class="subtitle">Заполните данные по каждому рейсу</div>

            <div class="form-group">
                <label>Теплоход</label>
                <select id="shipSelect">
                    <option value="">Выберите теплоход</option>
                    <option value="Сура">Сура</option>
                    <option value="Доброход">Доброход</option>
                    <option value="Колесовь">Колесовь</option>
                </select>
            </div>

            <div id="scheduleSection" class="schedule-section">
                <div id="shipInfo" class="ship-info"></div>

                <div class="form-group">
                    <label>Дата рейса</label>
                    <input type="date" id="dateInput">
                </div>

                <div class="form-group">
                    <label>Время рейса</label>
                    <div id="timeGrid" class="time-grid">
                        <div style="grid-column: 1/-1; text-align: center; color: #7f8c8d;">Выберите теплоход</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Количество пассажиров</label>
                    <div class="count-control">
                        <input type="number" id="countInput" min="0" placeholder="Введите число">
                        <button type="button" id="zeroBtn" class="zero-btn">🚫 0 пассажиров</button>
                    </div>
                </div>

                <button class="submit" id="submitBtn">💾 Сохранить данные</button>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        // ⚠️ ВАЖНО: вставьте сюда ваш URL из Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbwJmAAgoByQyo1P7RS3QR5VMWac0CknTN8fK4AYvH-7u3ziIUmEZjLp3x3rao715QI/exec';
        
        // Расписание для каждого теплохода
        const SCHEDULES = {
            "Сура": ["10:00", "11:30", "13:00", "14:30", "16:00", "17:30", "19:00"],
            "КолесовЪ": ["11:00", "12:30", "14:00", "15:30", "17:00", "18:30", "20:00"],
            "Доброход": ["12:00", "13:30", "15:00", "16:30", "18:00", "19:30", "21:00"]
        };
        
        let selectedTime = null;
        let currentShip = null;
        
        const shipSelect = document.getElementById('shipSelect');
        const scheduleSection = document.getElementById('scheduleSection');
        const shipInfo = document.getElementById('shipInfo');
        const timeGrid = document.getElementById('timeGrid');
        const dateInput = document.getElementById('dateInput');
        const countInput = document.getElementById('countInput');
        const submitBtn = document.getElementById('submitBtn');
        const zeroBtn = document.getElementById('zeroBtn');
        const messageDiv = document.getElementById('message');
        
        // Устанавливаем сегодняшнюю дату по умолчанию
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        
        // Кнопка "0 пассажиров"
        zeroBtn.addEventListener('click', function() {
            countInput.value = 0;
            showMessage('Установлено значение 0 пассажиров', 'success');
            setTimeout(() => clearMessage(), 1500);
        });
        
        // Показываем расписание при выборе теплохода
        shipSelect.addEventListener('change', function() {
            currentShip = this.value;
            
            if (currentShip) {
                scheduleSection.classList.add('active');
                
                const schedule = SCHEDULES[currentShip];
                shipInfo.innerHTML = `⏰ Расписание рейсов <span>${currentShip}</span>: ${schedule.join(' · ')}`;
                
                renderTimeButtons(currentShip);
            } else {
                scheduleSection.classList.remove('active');
                selectedTime = null;
            }
            clearMessage();
        });
        
        // Создаем кнопки времени для выбранного теплохода
        function renderTimeButtons(shipName) {
            const schedule = SCHEDULES[shipName];
            if (!schedule) return;
            
            timeGrid.innerHTML = '';
            selectedTime = null;
            
            schedule.forEach(time => {
                const btn = document.createElement('div');
                btn.className = 'time-btn';
                btn.textContent = time;
                btn.onclick = () => {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedTime = time;
                };
                timeGrid.appendChild(btn);
            });
        }
        
        // Отправка данных
        submitBtn.addEventListener('click', async function() {
            const ship = shipSelect.value;
            const date = dateInput.value;
            let count = countInput.value;
            
            if (!ship) {
                showMessage('Выберите теплоход', 'error');
                return;
            }
            
            if (!date) {
                showMessage('Выберите дату', 'error');
                return;
            }
            
            if (!selectedTime) {
                showMessage('Выберите время рейса', 'error');
                return;
            }
            
            if (count === '' || count === null) {
                showMessage('Введите количество пассажиров или нажмите "0 пассажиров"', 'error');
                return;
            }
            
            count = parseInt(count);
            if (isNaN(count) || count < 0) {
                showMessage('Введите корректное количество пассажиров (0 или больше)', 'error');
                return;
            }
            
            const formattedDate = date.split('-').reverse().join('.');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Сохранение...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ship: ship,
                        date: formattedDate,
                        time: selectedTime,
                        count: count
                    })
                });
                
                if (count === 0) {
                    showMessage(`✅ Рейс ${ship} на ${formattedDate} в ${selectedTime} — 0 пассажиров`, 'success');
                } else {
                    showMessage(`✅ ${count} пассажиров добавлено для ${ship} на ${formattedDate} в ${selectedTime}`, 'success');
                }
                
                selectedTime = null;
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                countInput.value = '';
                dateInput.value = today;
                
            } catch (error) {
                showMessage('❌ Ошибка: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 Сохранить данные';
            }
        });
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
        
        function clearMessage() {
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';
        }
    </script>
</body>
</html>
